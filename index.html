<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <title>For You ❤️</title>

      <style>
          body {
                margin: 0;
                      font-family: 'Segoe UI', sans-serif;
                            text-align: center;
                                  background: linear-gradient(135deg, #ff758c, #ff7eb3);
                                        color: white;
                                              overflow-x: hidden;
                                                  }

                                                      .container {
                                                            padding: 40px;
                                                                  max-width: 600px;
                                                                        margin: auto;
                                                                            }

                                                                                h1 {
                                                                                      font-size: 2.5rem;
                                                                                          }

                                                                                              button {
                                                                                                    padding: 12px 20px;
                                                                                                          font-size: 18px;
                                                                                                                border: none;
                                                                                                                      border-radius: 10px;
                                                                                                                            cursor: pointer;
                                                                                                                                  background: white;
                                                                                                                                        color: #ff4b5c;
                                                                                                                                              margin-top: 20px;
                                                                                                                                                  }

                                                                                                                                                      .card {
                                                                                                                                                            display: none;
                                                                                                                                                                  margin-top: 30px;
                                                                                                                                                                        padding: 20px;
                                                                                                                                                                              border-radius: 15px;
                                                                                                                                                                                    background: rgba(255, 255, 255, 0.2);
                                                                                                                                                                                          backdrop-filter: blur(10px);
                                                                                                                                                                                                animation: fadeIn 1s ease forwards;
                                                                                                                                                                                                    }

                                                                                                                                                                                                        img {
                                                                                                                                                                                                              width: 100%;
                                                                                                                                                                                                                    border-radius: 12px;
                                                                                                                                                                                                                          margin-top: 10px;
                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                  @keyframes fadeIn {
                                                                                                                                                                                                                                        from { opacity: 0; transform: translateY(20px); }
                                                                                                                                                                                                                                              to { opacity: 1; transform: translateY(0); }
                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                      .heart {
                                                                                                                                                                                                                                                            position: fixed;
                                                                                                                                                                                                                                                                  bottom: -10px;
                                                                                                                                                                                                                                                                        font-size: 20px;
                                                                                                                                                                                                                                                                              animation: floatUp 4s linear infinite;
                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                      @keyframes floatUp {
                                                                                                                                                                                                                                                                                            to {
                                                                                                                                                                                                                                                                                                    transform: translateY(-100vh);
                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                        </head>

                                                                                                                                                                                                                                                                                                                        <body>
                                                                                                                                                                                                                                                                                                                          <div class="container">
                                                                                                                                                                                                                                                                                                                              <h1 id="title"></h1>
                                                                                                                                                                                                                                                                                                                                  <p id="intro"></p>

                                                                                                                                                                                                                                                                                                                                      <button onclick="nextStep()">Open Surprise ✨</button>

                                                                                                                                                                                                                                                                                                                                          <div id="content"></div>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                              <audio id="bgMusic" src="music.mp3"></audio>

                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                    const config = {
                                                                                                                                                                                                                                                                                                                                                          name: "ReplaceName",
                                                                                                                                                                                                                                                                                                                                                                intro: "I made this just for you...",
                                                                                                                                                                                                                                                                                                                                                                      messages: [
                                                                                                                                                                                                                                                                                                                                                                              { text: "Hey... I just wanted to tell you something 💖" },
                                                                                                                                                                                                                                                                                                                                                                                      { text: "You genuinely make my days better" },
                                                                                                                                                                                                                                                                                                                                                                                              { text: "Here’s one of my favorite memories of you", image: "photo1.jpg" },
                                                                                                                                                                                                                                                                                                                                                                                                      { text: "And honestly..." },
                                                                                                                                                                                                                                                                                                                                                                                                              { text: "You mean a lot to me ❤️" }
                                                                                                                                                                                                                                                                                                                                                                                                                    ]
                                                                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                                                            let step = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                const title = document.getElementById("title");
                                                                                                                                                                                                                                                                                                                                                                                                                                    const intro = document.getElementById("intro");
                                                                                                                                                                                                                                                                                                                                                                                                                                        const content = document.getElementById("content");

                                                                                                                                                                                                                                                                                                                                                                                                                                            title.innerText = `Hey ${config.name} ❤️`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                intro.innerText = config.intro;

                                                                                                                                                                                                                                                                                                                                                                                                                                                    function typeText(element, text, speed = 35) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                          element.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                let i = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function typing() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (i < text.length) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        element.innerHTML += text.charAt(i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  i++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(typing, speed);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                typing();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function createHearts() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              setInterval(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const heart = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              heart.className = "heart";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      heart.innerText = "❤️";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              heart.style.left = Math.random() * 100 + "vw";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.body.appendChild(heart);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              setTimeout(() => heart.remove(), 4000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }, 300);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function nextStep() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const music = document.getElementById("bgMusic");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        music.play().catch(() => {});

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (step >= config.messages.length) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const card = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          card.className = "card";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const textEl = document.createElement("p");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      card.appendChild(textEl);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            content.appendChild(card);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  card.style.display = "block";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const msg = config.messages[step];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              typeText(textEl, msg.text);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (msg.image) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const img = document.createElement("img");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    img.src = msg.image;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            card.appendChild(img);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (step === config.messages.length - 1) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                createHearts();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            step++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </html>
